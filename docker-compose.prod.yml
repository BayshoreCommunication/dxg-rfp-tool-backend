services:
  dxg-rfp-tool-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: dxg-rfp-tool-backend:latest
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 8000
    ports:
      # Bind to localhost so only Nginx can reach it
      - "127.0.0.1:8001:8000"
    volumes:
      # Persist uploads across container restarts
      - ./uploads:/app/uploads
